name: "Recorded co-sign (optional)"
description: Individual timestamped issue — most people should comment on the co-sign ledger instead
title: "Recorded co-sign"
body:
  - type: markdown
    attributes:
      value: |
        **Usual path:** comment on the [co-sign ledger (#1)](https://github.com/hun0704/hun-charter/issues/1) with: *I adopt the Hun Charter v1.*

        Use this form only if you want a **separate issue** with its own timestamp.
  - type: checkboxes
    id: adopt
    attributes:
      label: Adoption
      options:
        - label: I adopt the Hun Charter v1
          required: true
  - type: input
    id: handle
    attributes:
      label: Your name or handle (optional)
      placeholder: e.g. @yourhandle
      value: ""
    validations:
      required: false
  - type: textarea
    id: note
    attributes:
      label: Optional note
      placeholder: e.g. Building agent tools — adopting for attribution rule.
      value: ""
    validations:
      required: false
