<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Hun Charter v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="charter.css">
</head>
<body>
  <header class="mast">
    <p class="kicker">A declaration of digital self-determination</p>
    <h1>The Hun Charter v1</h1>
    <p class="lede">No Hun holds title; every exchange resolves to a Principal.</p>
    <nav class="actions">
      <a class="btn primary" href="https://github.com/hun0704/hun-charter/issues/new?template=co-sign-quick.md&title=Co-sign&labels=co-sign">Co-sign</a>
      <a class="btn" href="https://github.com/hun0704/hun-charter">GitHub</a>
      <a class="btn" href="declaration.html">Declaration</a>
    </nav>
  </header>
  <main id="charter" class="charter-body" aria-busy="true">
    <p class="loading">Loading charter…</p>
  </main>
  <footer class="site-foot">
    <p>Cha11 · 2026-07-03 · Charter text under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a></p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({ mangle: false, headerIds: true });
    fetch("./charter.md")
      .then(r => r.text())
      .then(md => {
        document.getElementById("charter").innerHTML = marked.parse(md);
        document.getElementById("charter").removeAttribute("aria-busy");
      })
      .catch(() => {
        document.getElementById("charter").innerHTML =
          '<p>Could not load charter. <a href="https://github.com/hun0704/hun-charter/blob/main/CHARTER-v1.md">Read on GitHub</a>.</p>';
      });
  </script>
</body>
</html>
